version: 2

models:
  - name: fact_esales
    description: "Sales transactions joined to dimensions."
    columns:
      - name: PRODUCT_KEY
        data_tests:
          - relationships:
              arguments: 
                to: ref('dim_product')
                field: PRODUCT_KEY
  - name: fact_email_event
    description: "Marketing email events joined to dimensions."
  - name: dim_ecustomer
    columns: 
      - name: CUSTOMER_TYPE
        tests: 
          - accepted_values:
              arguments:
                values: [ "CUSTOMER", "SUBSCRIBER"]
  - name: dim_product
    columns: 
      - name: PRODUCT_KEY
        tests:
         - unique
  - name: dim_eemail
    columns:
      - name: EMAIL_KEY
        tests:
          - not_null
  - name: dim_edate
    columns:
      - name: DATE_KEY
        tests:
          - unique
  - name: dim_etime
    columns:
      - name: TIME_KEY
        tests:
          - not_null
  - name: dim_campaign
    columns:
      - name: CAMPAIGN_ID
        tests:
          - not_null